name: up-to-date

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: KazumaProject/kotlin-kana-kanji-converter
          path: converter
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Generate and test converter version 3 dictionary
        run: |
          (cd converter && ./gradlew buildSystemNgramDictionary test --tests 'com.kazumaproject.ngram.*' --no-daemon)
          cmp converter/src/main/resources/ngram/system_ngram.dat app/src/main/assets/ngram/system_ngram.dat
      - name: Verify version 3 asset and ZIP contents
        run: ./gradlew :app:verifySystemNgramAsset :app:verifySystemNgramAssetZip --no-daemon
      - name: Reader and conversion unit tests
        run: ./gradlew :app:testLiteStandardDebugUnitTest --tests 'com.kazumaproject.markdownhelperkeyboard.converter.ngram.*' --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system-ngram-build-report
          path: |
            app/build/reports/system-ngram/asset.txt
            app/build/distributions/system-ngram-assets.zip
            converter/build/reports/ngram/build.txt

  conversion:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Real small-dictionary conversion test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: arm64-v8a
          profile: pixel_7_pro
          disable-animations: true
          script: ./gradlew :app:connectedLiteStandardDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.kazumaproject.markdownhelperkeyboard.converter.SystemNgramCandidatePerformanceInstrumentedTest#conversionReranksAndRestoresWithoutChangingScore --no-daemon
