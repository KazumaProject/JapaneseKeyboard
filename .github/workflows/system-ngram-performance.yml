name: System n-gram performance

on:
  workflow_dispatch:

jobs:
  pixel-emulator:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: KazumaProject/kotlin-kana-kanji-converter
          path: converter
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Generate converter-built 100,000-rule version 3 asset
        run: |
          python3 tools/system_ngram/generate_stress_rules.py --count 99997 --output converter/src/main/ngram/performance.ngram
          (cd converter && ./gradlew buildSystemNgramDictionary test --tests 'com.kazumaproject.ngram.*' --no-daemon)
          ./gradlew :app:installSystemNgramAsset -PsystemNgramSource="$PWD/converter/src/main/resources/ngram/system_ngram.dat" --no-daemon
      - name: Measure alternating enabled/disabled conversion
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: arm64-v8a
          profile: pixel_7_pro
          disable-animations: true
          script: |
            ./gradlew :app:connectedLiteStandardDebugAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.class=com.kazumaproject.markdownhelperkeyboard.converter.SystemNgramCandidatePerformanceInstrumentedTest \
              -Pandroid.testInstrumentationRunnerArguments.systemNgramPerf=true \
              -Pandroid.testInstrumentationRunnerArguments.systemNgramIterations=100 \
              --no-daemon
            mkdir -p build/system-ngram-performance
            adb exec-out run-as com.kazumaproject.markdownhelperkeyboard.lite cat files/ngram-performance/system-candidate-comparison.tsv > build/system-ngram-performance/system-candidate-comparison.tsv
      - name: Remove temporary rules and restore release asset
        if: always()
        run: |
          rm -f converter/src/main/ngram/performance.ngram
          git checkout -- app/src/main/assets/ngram/system_ngram.dat
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system-ngram-performance-emulator
          path: |
            build/system-ngram-performance/
            converter/build/reports/ngram/build.txt
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
